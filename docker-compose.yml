services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prn232-lab1-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/PRN232.Lab1.API/Dockerfile
    container_name: prn232-lab1-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=PRN232Lab1;User Id=sa;Password=Your_password123!;TrustServerCertificate=True;Encrypt=False"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy